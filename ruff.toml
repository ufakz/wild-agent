# Ruff configuration for wild-agent
# Python 3.11+ linting and formatting

[lint]
select = [
    "F",    # Pyflakes
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "I",    # isort
    "N",    # pep8-naming
    "UP",   # pyupgrade
    "B",    # flake8-bugbear
    "A",    # flake8-builtins
    "C4",   # flake8-comprehensions
    "DTZ",  # flake8-datetimez
    "T10",  # flake8-debugger
    "EM",   # flake8-errmsg
    "ISC",  # flake8-implicit-str-concat
    "ICN",  # flake8-import-conventions
    "PIE",  # flake8-pie
    "PT",   # flake8-pytest-style
    "Q",    # flake8-quotes
    "RET",  # flake8-return
    "SIM",  # flake8-simplify
    "PTH",  # flake8-use-pathlib
]

ignore = [
    "E501",  # Line too long (handled by formatter)
    "B008",  # Do not perform function call in argument defaults
    "PT009", # Use explicit @pytest.mark over pytest.raises
]

# Allow autofix for all enabled rules
fixable = ["ALL"]
unfixable = []

# Exclude directories
exclude = [
    ".git",
    ".venv",
    "venv",
    "__pycache__",
    "build",
    "dist",
    "*.egg-info",
]

# Line length
line-length = 88

# Target Python 3.11+
target-version = "py311"

[lint.per-file-ignores]
"tests/**/*.py" = [
    "S101",  # Use of assert detected
    "PLR2004",  # Magic value used in comparison
]

[lint.isort]
known-first-party = ["wild_agent"]
force-single-line = false
lines-after-imports = 2

[lint.mccabe]
max-complexity = 10

[format]
# Use PEP 8 style
quote-style = "double"
indent-style = "space"
line-ending = "auto"
